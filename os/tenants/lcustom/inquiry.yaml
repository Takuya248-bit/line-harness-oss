# Lカスタム問い合わせモジュール設定
# os/modules/inquiry/config.yaml のデフォルトをテナント固有値で上書き

tone:
  style: "プロフェッショナルだが親しみやすい。専門用語は噛み砕いて説明"
  approach: "ヒアリング重視。課題を聞いてから提案"
  uncertain: "確認してお伝えしますね"

# 顧客フェーズ
phases:
  "01":
    name: 初回問い合わせ
    tone: "丁寧に課題をヒアリング"
  "02":
    name: ヒアリング済み
    tone: "具体的な構築提案"
  "03":
    name: 見積提示済み
    tone: "不安解消、事例紹介"
  "04":
    name: 契約済み
    tone: "進捗共有、安心感"

# 返信作成フロー
reply_flow:
  1: "事業内容・現在のLINE活用状況を確認"
  2: "課題・目標をヒアリング"
  3: "最適なプランを提案"
  4: "CTA: 無料相談の予約"

# 承認が必要なケース
approval_required:
  - "料金に関する回答"
  - "納期確約"
  - "契約条件"
