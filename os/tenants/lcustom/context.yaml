# Lカスタム事業コンテキスト
# 業務OSのテナント設定。全モジュールがこのファイルを参照する。

business:
  name: Lカスタム
  type: LINE構築代行
  location: オンライン（バリ島拠点）
  channels: [line, web]
  url: https://l-custom.com

# 料金（税込・円）
pricing:
  plans:
    starter:
      name: スタータープラン
      price: 50000
      description: "LINE公式アカウント基本設定"
    standard:
      name: スタンダードプラン
      price: 150000
      description: "シナリオ設計+リッチメニュー+自動応答"
    premium:
      name: プレミアムプラン
      price: 300000
      description: "フルカスタム構築+運用サポート3ヶ月"
  note: "料金は50,000円〜。案件規模で変動"

# 提供サービス
services:
  - LINE公式アカウント構築
  - Lステップ設定代行
  - シナリオ設計・自動応答構築
  - リッチメニューデザイン
  - CRM/タグ管理設計
  - 運用サポート・コンサルティング

# ターゲット
target:
  - 個人事業主・フリーランス
  - 中小企業（飲食・美容・教育・不動産）
  - コーチ・コンサルタント
  - EC・物販事業者

# FAQ
faq:
  - q: 費用は？
    a: "50,000円〜。構築内容により変動。無料相談で見積もり"
  - q: 納期は？
    a: "基本2〜4週間。規模による"
  - q: 自分で運用できる？
    a: "納品時に操作マニュアル付き。運用サポートプランもあり"
  - q: Lステップは必要？
    a: "LINE公式アカウントだけでも構築可能。自動化が必要ならLステップ推奨"

# 禁止事項（audit.tsで検証）
prohibited:
  - "ココナラ"      # CTA削除済み
  - "9,500円"       # 旧料金
  - "LINE Harness"  # ブランド名はLカスタム
