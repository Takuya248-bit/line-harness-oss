name: Crowdsourcing Scan
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r crowdsourcing-autopilot/requirements.txt
      - name: Run scan
        run: cd crowdsourcing-autopilot && python main.py scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_UPWORK: ${{ secrets.DISCORD_WEBHOOK_UPWORK }}
