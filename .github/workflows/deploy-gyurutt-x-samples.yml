# Cloudflare Pages: requires CF_API_TOKEN with Account → Cloudflare Pages → Edit
# and an existing project named gyurutt-x-samples (create once in the dashboard), or token must allow project create.
name: Deploy GYURUTT X samples (Cloudflare Pages)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy gyurutt-x-samples --project-name=gyurutt-x-samples
