name: Deploy GYURUTT X samples (Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'gyurutt-x-samples/**'
      - '.github/workflows/deploy-gyurutt-x-samples.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy gyurutt-x-samples --project-name=gyurutt-x-samples
